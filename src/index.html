<!DOCTYPE html>
<html lang="en"
      class="vw-100
             vh-100">

 <head>
  <title>
   Apperitif
  </title>
  <meta charset="UTF-8">
  <meta name="viewport" 
        content="width=device-width, 
                 initial-scale=1">
  <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">   
  <link rel="stylesheet"
        type="text/css"
        href="https://fonts.googleapis.com/css?family=BBH+Bartle|Tangerine&effect=fire|
                                                                        neon|
                                                                        outline|
                                                                        emboss|
                                                                        shadow-multiple|
                                                                        anaglyph|
                                                                        3d|
                                                                        float
                                              &display=swap">            
  <link rel="stylesheet" 
        href="style.css">
 </head>
 <body class="h-100
              w-100
              overflow-hidden">
              
  <div class="container-fluid"
       id="canvas">

   <div class="box
               border
               border-2
               border-danger
               rounded-pill
               h-75
               position-absolute
               mt-5
               pt-5
               mx-3">
   </div>
   <div class="box2
               border
               border-5
               border-danger
               rounded-pill
               h-75
               w-75
               position-absolute
               m-5">
   </div>

   <h1 class="position-relative
              mx-2
              fw-bold">
    Music 
<br>
    &nbsp&nbspPlayer
   </h1> 
   
   <div class="music
               position-absolute
               d-inline-flex
               h-25
               w-75">
    <input type="range" 
           value="0" 
           min="0" 
           max="100" 
           step="1"
           class="progBar
                  d-none">
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
    <div class="bar">        
    </div>
   </div>

   <input type="range" 
          id="vol"
          min="0" 
          max="100"
          class="vol
                 position-absolute
                 m-4">
                 
   <input type="file" 
          class="Upld
                 d-inline
                 mx-5
                 p-1
                 position-absolute" 
          name="files[0]" 
          id="upload" 
          multiple>

   <button id="prevBtn"
           class="position-absolute
                  d-inline
                  mx-2
                  fw-bold"
           type="button">
    ◁
   </button>  
   <button id="playPause"
           class="position-absolute
                  mx-5
                  px-1
                  d-inline"
           type="button">
    ❚❚ ▶
   </button>  
   <button id="nxtBtn"
           class="position-absolute
                  d-inline
                  mx-5
                  fw-bold"
           type="button">
     ▷
   </button>  

  </div> 

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"
          type="text/javascript">
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
          crossorigin="anonymous">
  </script>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js">
  </script>

  <script src="index.js">
  </script>

 </body>
</html>
